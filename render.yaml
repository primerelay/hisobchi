# Render Blueprint - Hisobchi API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hisobchi-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install -g pnpm && NODE_ENV=development pnpm install && pnpm build
    startCommand: pnpm --filter @hisobchi/api start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: API_URL
        fromService:
          type: web
          name: hisobchi-api
          property: host
